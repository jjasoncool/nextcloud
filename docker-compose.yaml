version: "3.9"

services:
    nextcloud:
        build:
            context: "./nextcloud/"
            args:
                NC_VERSION: ${NC_VERSION}
                GID: ${GID}
        user: "${UID}:${GID}"
        environment:
            - TZ=Asia/Taipei
            - MYSQL_HOST=mariadb
            - MYSQL_USER=${DB_USER}
            - MYSQL_PASSWORD=${DB_PASS}
            - MYSQL_DATABASE=${DB_DATABASE}
            - REDIS_HOST=redis
            - REDIS_HOST_PASSWORD=${RD_PASS}
            - NEXTCLOUD_TRUSTED_DOMAINS=${NC_TRUST_DOMAINS}
            - TRUSTED_PROXIES=${REVERSE_PROXY_IP}
            - OVERWRITEPROTOCOL=${PROTOCOL}
        depends_on:
            - mariadb
            - redis
        ports:
            - "${NC_PORT}:80"
        volumes:
            - nc-code:/var/www/html/
            - nc-data:/var/www/html/data
        container_name: "${NC_NAME}"
        restart: always

    mariadb:
        # 預設 user 999 host必須加上 vboxsf group `usermod -aG vboxsf {999 user}`
        image: mariadb:${DB_VERSION}
        command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --innodb-read-only-compressed=OFF
        environment:
            - TZ=Asia/Taipei
            - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
            - MYSQL_USER=${DB_USER}
            - MYSQL_PASSWORD=${DB_PASS}
            - MYSQL_DATABASE=${DB_DATABASE}
        ports:
            - "${DB_PORT}"
        volumes:
            - db-data:/var/lib/mysql
        container_name: "${DB_NAME}"
        restart: always

    redis:
        image: redis:${RD_VERSION}
        container_name: "${RD_NAME}"
        command: "redis-server --requirepass ${RD_PASS}"
        deploy:
            resources:
                limits:
                    memory: 200M
        restart: always

volumes:
    db-data:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "${DB_DATAPATH}"
        external: false
    nc-code:
    nc-data:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "${NC_DATAPATH}"
        external: false
